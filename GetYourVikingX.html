    <script>
  (function () {
    var form = document.querySelector('form[data-form-title="VikingX Consumer"]');
    if (!form) return;

    var successAlert = form.querySelector('[data-form-alert]');
    var errorAlert = form.querySelector('[data-form-alert-danger]');
    var submitButton = form.querySelector('[type="submit"]');

    function showAlert(alert, message) {
      if (!alert) return;
      alert.textContent = message;
      alert.removeAttribute('hidden');
      alert.style.display = 'block';
    }

    function hideAlerts() {
      [successAlert, errorAlert].forEach(function (alert) {
        if (!alert) return;
        alert.setAttribute('hidden', 'hidden');
        alert.style.display = 'none';
      });
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      hideAlerts();

      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      var accessKey = form.querySelector('[name="access_key"]');
      if (!accessKey || accessKey.value === 'YOUR_WEB3FORMS_ACCESS_KEY_HERE') {
        showAlert(errorAlert, 'Please add your Web3Forms access key before publishing this form.');
        return;
      }

      if (submitButton) {
        submitButton.disabled = true;
        submitButton.classList.add('btn-loading');
      }

      var formData = new FormData(form);
      var payload = Object.fromEntries(formData);

      fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify(payload)
      })
        .then(function (response) {
          return response.json().then(function (data) {
            if (!response.ok || !data.success) {
              throw new Error(data.message || 'Something went wrong. Please try again.');
            }
            return data;
          });
        })
        .then(function (data) {
          console.log('Web3Forms response JSON:', JSON.stringify(data));
          var responseMessage = (data && data.message) || (data && data.body && data.body.message) || 'You are all set. Time to ride. We will be in touch soon.';
          form.reset();
          showAlert(successAlert, responseMessage);
        })
        .catch(function (error) {
          showAlert(errorAlert, error.message || 'Something went wrong. Please try again.');
        })
        .finally(function () {
          if (submitButton) {
            submitButton.disabled = false;
            submitButton.classList.remove('btn-loading');
          }
        });
    });
  })();
  </script>
